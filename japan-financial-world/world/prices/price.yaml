schema: price
version: 0.1
description: Observable market price or valuation mark.

required:
  - id
  - asset_id
  - timestamp
  - value

fields:
  id:
    type: string
  asset_id:
    type: string
  market_id:
    type: string
    nullable: true
  timestamp:
    type: datetime
  value:
    type: number
  currency:
    type: string
    default: JPY
  price_type:
    type: string
    allowed: [trade, close, mark, appraisal, model]
  liquidity:
    type: number
    unit: score
    range: [0, 1]
  confidence:
    type: number
    unit: score
    range: [0, 1]

network: market_price_network
