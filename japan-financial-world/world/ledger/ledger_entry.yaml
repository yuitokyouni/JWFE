schema: ledger_entry
version: 0.1
description: Append-only record of a world state transition.

required:
  - id
  - timestamp
  - entry_type
  - channel

fields:
  id:
    type: string
  timestamp:
    type: datetime
  entry_type:
    type: string
    examples: [state_update, trade, contract_update, signal_published, constraint_update, price_update]
  channel:
    type: string
    allowed: [asset_ownership, contract, market_price, information_signal, constraint]
  source_space:
    type: string
  target_refs:
    type: list
    items: string
  payload:
    type: map
  notes:
    type: string
    nullable: true
