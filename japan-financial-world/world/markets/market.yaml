schema: market
version: 0.1
description: Tradable market state for an asset or asset class.

required:
  - asset_id
  - market_type
  - price

fields:
  asset_id:
    type: string
  market_type:
    type: string
    examples: [equity, credit, reit, real_estate, fx, commodity]
  price:
    type: number
    network: market_price_network
    frequency: daily
  liquidity:
    type: number
    unit: score
    range: [0, 1]
  volatility:
    type: number
    unit: annualized_ratio
  free_float:
    type: number
    unit: ratio
  short_interest:
    type: number
    unit: ratio
  passive_ownership:
    type: number
    unit: ratio
  foreign_ownership:
    type: number
    unit: ratio

inputs:
  - orders
  - previous_price
  - liquidity
  - information_signals
  - constraints

outputs:
  - market_price
  - executed_trades
  - liquidity_signal
  - price_signal
