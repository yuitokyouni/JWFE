# Minimal public-release CI gate for the Financial World Engine.
#
# This workflow verifies test correctness, import / compile health,
# basic linting, secret scanning, and that the FWE Reference Demo
# still runs. It introduces no simulation behavior. It is the
# tooling counterpart of docs/roadmap/fwe_core_public_release.md.
#
# Tighten over time; do not loosen without a documented decision.

name: CI

on:
  push:
    branches: [main]
    # Version tags (v0.16, v1.7-public-rc1, v1.8-public-release, ...)
    # gate the public-release workflow: tagging triggers the same
    # tests + lint + demo + secret-scan jobs as a push to main, so a
    # red tag run blocks the release. Pre-tag, pushing the commit to
    # main runs CI once; tagging then runs CI again on the same
    # commit under the tag ref. Both must be green for a final
    # public-release tag.
    tags: ["v*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  tests:
    name: Tests + lint + demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-py312-

      - name: Install dev dependencies
        # The runtime is stdlib-only. Dev deps (pytest, ruff) come
        # from the [project.optional-dependencies] dev group at
        # repo root.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pytest
        working-directory: japan-financial-world
        run: python -m pytest -q

      - name: compileall (import / syntax health)
        working-directory: japan-financial-world
        run: python -m compileall world spaces tests examples

      - name: ruff (lint)
        # Runs from repo root; pyproject.toml's [tool.ruff] config
        # decides scope and rule set.
        run: ruff check .

      - name: FWE Reference Demo smoke
        # The demo must continue to produce a complete causal
        # ledger trace. CI runs it as a smoke test so the demo
        # cannot silently break.
        working-directory: japan-financial-world
        run: python examples/reference_world/run_reference_loop.py

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # The repo policy in SECURITY.md requires secret-scanning
    # before any public release. This job runs gitleaks on every
    # push / PR. It is non-blocking until the project enables a
    # license token, but a positive find should still be
    # investigated immediately.
    permissions:
      contents: read
      pull-requests: read
    continue-on-error: true
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is provided automatically by the runner.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required to scan organization repos
          # under gitleaks-action; for personal / OSS repos this is
          # optional. If absent, the action exits successfully
          # without scanning, so the gate stays informational.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
